<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--accent:#145a4a;--accent2:#2d6f8e;--terracotta:#b85c38;--gold:#d99a45;--bg:#f3f5f2;--card:#fff;--ink:#202522;--sub:#626b66;--warn:#a53c2c;--feed:#287568}
html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;font-size:15px;line-height:1.5}
body{padding-bottom:64px}
header{position:sticky;top:0;z-index:20;background:#145a4a;color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 16px 10px;border-bottom:3px solid #d99a45}
header h1{font-size:18px;font-weight:700}
header .sub{font-size:12px;opacity:.85;margin-top:2px}
.daytabs{position:sticky;top:0;z-index:15;display:flex;gap:8px;overflow-x:auto;padding:10px 12px;background:#fff;border-bottom:1px solid #eee;scrollbar-width:none}
.daytabs::-webkit-scrollbar{display:none}
.daytab{flex:0 0 auto;padding:7px 12px;border-radius:20px;background:#eef0f4;color:#555;font-size:13px;font-weight:600;white-space:nowrap;border:none}
.daytab.on{background:var(--accent);color:#fff}
.daytab small{display:block;font-size:10px;font-weight:400;opacity:.8}
.wrap{padding:14px 14px 24px;max-width:680px;margin:0 auto}
.theme{background:#e8f1ed;border-left:4px solid var(--accent);border-radius:8px;padding:10px 12px;font-size:13px;color:#244e43;margin-bottom:12px}
.warn{background:#fbeae8;border-left:4px solid var(--warn);border-radius:8px;padding:10px 12px;font-size:12.5px;color:#a3271c;margin-bottom:12px}
.tl{position:relative;padding-left:8px}
.item{position:relative;display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #eef0f4}
.item:last-child{border-bottom:none}
.time{flex:0 0 64px;font-size:12px;font-weight:700;color:var(--accent2);padding-top:2px}
.ic{flex:1}
.ic .t{font-weight:600;font-size:14px}
.ic .d{font-size:12.5px;color:var(--sub);margin-top:4px;line-height:1.7;white-space:pre-wrap}
.feed{background:#e8f5f7;border-radius:8px;padding:10px 12px;margin-top:14px}
.feed h3{font-size:13px;color:var(--feed);margin-bottom:6px}
.feed div{font-size:12px;color:#3a6a72;padding:2px 0}
.card{background:var(--card);border-radius:8px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card h3{font-size:14px;margin-bottom:4px}
.card .meta{font-size:12px;color:var(--sub);white-space:pre-wrap}
.tag{display:inline-block;background:#eef0f4;border-radius:6px;padding:1px 7px;font-size:11px;color:#666;margin:2px 4px 2px 0}
.todo{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f4;font-size:13px}
.todo .bx{flex:0 0 auto}
.pack-title{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.pack-actions{display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:wrap}
.pack-sync-status{min-height:18px;margin:-3px 2px 8px;text-align:right;font-size:11.5px;color:#8b8993}
.pack-sync-status.ok{color:var(--feed)}
.pack-sync-status.err{color:#c0392b}
.pack-sync-status.pending{color:#9a6a00}
.pack-sync-btn,.pack-restore{border:1px solid #d9e1dd;background:#fff;color:var(--accent);border-radius:7px;padding:2px 7px;font-size:12px;line-height:1.6}
.pack-sync-btn.on{border-color:#cde8dc;background:#eef8f3;color:var(--feed)}
.pack-restore{display:none}
.pack-restore.on{display:inline-flex;align-items:center;gap:3px}
.pack-card h3{display:flex;align-items:center;justify-content:space-between;gap:10px}
.pack-count{font-size:11px;font-weight:500;color:#999;white-space:nowrap}
.pack-list{margin-top:5px}
.packi{display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-top:1px solid #f0f0f4;font-size:12.5px;color:var(--sub);line-height:1.55}
.packi:first-child{border-top:none}
.packi input{flex:0 0 auto;width:18px;height:18px;margin-top:1px;accent-color:var(--feed)}
.pack-text{flex:1;min-width:0;white-space:pre-wrap;outline:none;border-radius:6px;padding:1px 4px;margin:-1px -4px;color:var(--sub)}
.pack-text:focus{background:#fff8e8;box-shadow:inset 0 0 0 1px #bcd5ca;color:#333;text-decoration:none}
.pack-text:empty:before{content:'填写行李项';color:#bbb}
.packi.done .pack-text{text-decoration:line-through;color:#999}
.packi.done .pack-text:focus{text-decoration:none;color:#333}
.pack-del{flex:0 0 auto;width:24px;height:24px;border:none;background:transparent;color:#aaa;border-radius:6px;font-size:19px;line-height:20px;padding:0;margin-top:-2px}
.pack-del:active{background:#e9f2ee;color:var(--accent)}
.pack-add{width:100%;border:1px dashed #c7d8d0;background:#f8fbf9;color:var(--accent);border-radius:8px;padding:7px 10px;margin-top:8px;font-size:12.5px;text-align:left}
.pack-add:active{background:#e9f2ee}
.sec-title{font-size:13px;font-weight:700;color:var(--accent);margin:14px 2px 8px}
nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;background:#fff;border-top:1px solid #e8e8ee;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;border:none;background:none;padding:8px 0 6px;font-size:10px;color:#999}
nav button.on{color:var(--accent)}
nav button .e{display:block;font-size:19px;margin-bottom:1px}
.view{display:none}
.view.on{display:block}
.hide{display:none}
.mapwrap{margin-bottom:12px}
.daymap{height:215px;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);background:#dfe6e9}
.maplegend{font-size:11.5px;color:#555;margin-top:7px;line-height:1.7}
.maplegend b{color:#333;font-weight:600}
.mapnote{font-size:11px;color:#999;margin-top:3px}
.leaflet-container{font-family:inherit;background:#dfe6e9}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin:0 3px 0 8px;vertical-align:middle}
.oneliner{background:#eef6f0;border-left:4px solid var(--feed);border-radius:8px;padding:9px 12px;font-size:13px;color:#2c5a4a;margin-bottom:12px;font-weight:600}
.ovbox{margin-bottom:12px}
.ovh{font-size:13px;font-weight:700;color:var(--accent);margin:0 2px 6px}
.ovscroll{overflow-x:auto;border-radius:8px;background:#fff}
.ovt{width:100%;border-collapse:collapse;font-size:12px}
.ovt td{padding:5px 6px;border-bottom:1px solid #eef0f4;vertical-align:top}
.ovt-t{font-weight:700;color:var(--accent2);white-space:nowrap;width:52px}
.ovt-l{display:block;color:#999;font-size:11px;margin-top:1px}
.ovt-tip{color:#a3271c;font-size:11.5px;width:36%}
.lb{color:var(--accent2);font-weight:700}
.ic .d b{color:var(--ink)}
.ic .d b.lb{color:var(--accent2)}
.chk{background:#eef6f0;border-radius:8px;padding:10px 12px;margin-top:14px}
.chkh{font-size:13px;font-weight:700;color:var(--feed);margin-bottom:6px}
.chki{font-size:12.5px;color:#33474f;padding:2px 0}
.baby{background:#e8f5f7;border-radius:8px;padding:10px 12px;margin-top:14px}
.babyh{font-size:13px;font-weight:700;color:var(--feed);margin-bottom:6px}
.babi{font-size:12.5px;color:#33474f;padding:3px 0}
.babi b{color:var(--feed)}
.babf{font-size:12px;color:#3a6a72;padding:1px 0 1px 10px}
.ft{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:5px}
.ft th{background:#d7ebee;padding:4px 5px;text-align:left;font-weight:600;color:#2c5a4a}
.ft td{padding:4px 5px;border-bottom:1px solid #d7ebee;vertical-align:top}
.status{display:inline-flex;align-items:center;border-radius:5px;padding:1px 6px;font-size:10.5px;font-weight:700;vertical-align:1px;background:#eef1ef;color:#56615b}
.status.ok{background:#e4f2eb;color:#176447}.status.wait{background:#fff2dc;color:#925600}.status.p0{background:#f9e5e1;color:#a53c2c}
.phase{display:inline-block;margin-left:6px;color:#d8ebe4;font-size:11px;font-weight:500}
.maplink{display:inline-flex;align-items:center;gap:4px;margin-top:8px;border:1px solid #cadbd4;border-radius:7px;padding:5px 8px;color:var(--accent);text-decoration:none;font-size:12px;font-weight:650;background:#f8fbf9}
.maplink:active{background:#e8f1ed}
.filters{display:flex;gap:6px;overflow-x:auto;margin:0 0 10px;scrollbar-width:none}.filters::-webkit-scrollbar{display:none}
.filter{flex:0 0 auto;border:1px solid #d8dfdb;background:#fff;color:#65706a;border-radius:7px;padding:6px 10px;font-size:12px}.filter.on{background:var(--accent);border-color:var(--accent);color:#fff}
.source-link{color:var(--accent2);text-decoration:none;overflow-wrap:anywhere}
.todo-main{flex:1;min-width:0}.todo-meta{display:block;margin-top:3px;font-size:11px;color:#8a918d}.todo input{width:18px;height:18px;accent-color:var(--accent);flex:0 0 auto}
.todo.done .todo-main{text-decoration:line-through;color:#999}.todo.done .todo-meta{text-decoration:none;color:#aaa}
.split-note{background:#fff4e8;border-left:4px solid var(--terracotta);border-radius:8px;padding:9px 12px;color:#87472f;font-size:12.5px;margin-bottom:12px}
@media (min-width:760px){.wrap{max-width:760px}.daymap{height:300px}header h1{font-size:20px}}
@media (max-width:480px){
  .ovt tr{display:grid;grid-template-columns:88px minmax(0,1fr)}
  .ovt td{display:block;width:auto}
  .ovt-tip{grid-column:2;padding-top:0!important;color:var(--warn)}
  nav button{font-size:9px}
  nav button .e{font-size:18px}
}
</style>
</head>

    if(!isPackingStorageKey(k)) return;
    const m=(meta&&meta[k])||{};
    const exists=Object.prototype.hasOwnProperty.call(cleanItems,k);
    cleanMeta[k]={ts:String(m.ts||now),by:String(m.by||updatedBy||packDeviceId()),deleted:exists?false:!!m.deleted};
  });

}
function makeCloudPackStateFromLocalItems(items,ts,by){
  const meta={};
  const stamp=ts||packIsoNow();
  const device=by||packDeviceId();
  Object.entries(items||{}).forEach(([k,v])=>{
    if(isPackingStorageKey(k)&&v!=null) meta[k]={ts:stamp,by:device,deleted:false};
  });
  return makeCloudPackState(items,meta,device);
}
function mergePackPendingIntoCloud(cloud,pending){
  const base=normalizeCloudPackState(cloud);
  const normalized=normalizePackPendingObject(pending).changes;
  const items={...(base.items||{})};
  const meta={...(base.meta||{})};
  const applied={};
  const skipped={};
  Object.entries(normalized).forEach(([k,entry])=>{
    if(!isPackingStorageKey(k)) return;
    const current=meta[k]||{};
    const incomingMs=packTimestampMs(entry.ts);
    const currentMs=packTimestampMs(current.ts);
    if(!current.ts||incomingMs>=currentMs){
      if(entry.value==null){
        delete items[k];
        meta[k]={ts:entry.ts,by:entry.by,deleted:true};
      }else{
        items[k]=String(entry.value);
        meta[k]={ts:entry.ts,by:entry.by,deleted:false};
      }
      applied[k]=entry;
    }else{
      skipped[k]=entry;
    }
  });

function splitPackPendingByCloud(cloud,pending){
  const latest=normalizeCloudPackState(cloud);
  const normalized=normalizePackPendingObject(pending).changes;
  const verified={};
  const retry={};
  Object.entries(normalized).forEach(([k,entry])=>{
    const current=latest.meta[k];
    if(!current){
      retry[k]=entry;
      return;
    }
    const currentMs=packTimestampMs(current.ts);
    const entryMs=packTimestampMs(entry.ts);
    if(currentMs>entryMs){
      verified[k]=entry;
      return;
    }
    if(currentMs<entryMs){
      retry[k]=entry;
      return;
    }
    if(entry.value==null){
      if(current.deleted||!Object.prototype.hasOwnProperty.call(latest.items,k)) verified[k]=entry;
      else retry[k]=entry;
    }else if(!current.deleted&&latest.items[k]===String(entry.value)){
      verified[k]=entry;
    }else{
      retry[k]=entry;
    }
  });
  return {verified,retry,latest};

function packSleep(ms){

}
async function saveCloudPackState(state){

async function handlePackCloudbaseHandoff(){
  if(packCanUseBridge()) return false;
  const params=new URLSearchParams(location.search||'');
  const raw=params.get('handoff');
  if(!raw) return false;
  try{
    const cleanUrl=location.pathname+(params.has('v')?'?v='+encodeURIComponent(params.get('v')):'');
    history.replaceState(null,'',cleanUrl);
  }catch(e){}
  try{
    const payload=decodePackCloudbaseHandoff(raw);
    if(!payload) return false;
    if(payload.mode==='replace'){
      setPackSyncStatus('正在用本机清单更新云端…','pending');
      const items={};
      Object.entries(payload.items||{}).forEach(([k,v])=>{
        if(isPackingStorageKey(k)&&v!=null) items[k]=String(v);
      });
      if(Object.keys(items).length){
        const data=await saveCloudPackState(makeCloudPackStateFromLocalItems(items,payload.createdAt,payload.updatedBy));
        applyCloudPackState(data.items||{},true);
        savePendingPackChanges({});
        setPackSyncStatus(`已用本机清单更新云端 ${packNowLabel()}`,'ok');
      }else{
        setPackSyncStatus('本机没有可上传的行李改动','err');
      }
      return true;
    }
    if(payload.mode==='push'){
      setPackSyncStatus('正在保存手机清单到云端…','pending');
      const pending=normalizePackPendingObject(payload.pending||{},payload.createdAt).changes;
      let pushed=false;
      if(Object.keys(pending).length){
        savePendingPackChanges({...pendingPackChanges(),...pending});
        pushed=await flushPackCloudPending();
      }else{
        const cloud=await fetchCloudPackState();
        const localItems={};
        Object.entries(payload.items||{}).forEach(([k,v])=>{
          if(isPackingStorageKey(k)&&v!=null) localItems[k]=String(v);
        });
        if(!packCloudHasAny(cloud)&&Object.keys(localItems).length){
          const bootstrap={};
          Object.entries(localItems).forEach(([k,v])=>{ bootstrap[k]=packChangeEntry(v,payload.createdAt,payload.updatedBy); });
          savePendingPackChanges(bootstrap);
          pushed=await flushPackCloudPending();
        }else{
          applyCloudPackState(cloud.items||{},true);
        }
      }
      if(pushed) setPackSyncStatus(`已上传到云端 ${packNowLabel()}`,'ok');
      else if(!Object.keys(pendingPackChanges()).length) setPackSyncStatus(`已云同步 ${packNowLabel()}`,'ok');
      return true;
    }
    setPackSyncStatus('正在从云端读取…','pending');
    const data=await fetchCloudPackState();
    applyCloudPackState(data.items||{},true);
    setPackSyncStatus(`已云同步 ${packNowLabel()}`,'ok');
    return true;
  }catch(e){
    console.warn('[pack-sync] handoff failed', e);
    setPackSyncStatus('云同步接力失败，请再点一次','err');
    return true;
  }
}
function applyCloudPackState(items,prune){
  const keep=new Set(Object.keys(items||{}).filter(isPackingStorageKey));
  PACK_SYNC.applying=true;
  try{
    Object.entries(items||{}).forEach(([k,v])=>{
      if(!isPackingStorageKey(k)) return;
      localStorage.setItem(k,String(v));
    });
    if(prune){
      packStorageKeys().forEach(k=>{
        if(!keep.has(k)) localStorage.removeItem(k);
      });
    }
  }catch(e){
    console.warn('[pack-sync] apply failed', e);
  }finally{
    PACK_SYNC.applying=false;
  }
  const active=document.activeElement;
  if(!(active&&active.classList&&active.classList.contains('pack-text'))) renderTodos();
}
function queuePackCloudPatch(changes){
  if(PACK_SYNC.applying) return;
  const filtered={};
  const ts=packIsoNow();
  Object.entries(changes||{}).forEach(([k,v])=>{
    if(isPackingStorageKey(k)) filtered[k]=packChangeEntry(v,ts,packDeviceId());
  });
  if(!Object.keys(filtered).length) return;
  const pending={...pendingPackChanges(),...filtered};
  savePendingPackChanges(pending);
  setPackSyncStatus('待同步到另一台手机','pending');
  if(PACK_SYNC.timer) clearTimeout(PACK_SYNC.timer);
  PACK_SYNC.timer=setTimeout(()=>{ flushPackCloudPending().catch(()=>{}); },700);
}
async function flushPackCloudPending(){
  if(PACK_SYNC.flushing) return false;
  const changes=pendingPackChanges();
  if(!Object.keys(changes).length) return true;
  PACK_SYNC.flushing=true;
  setPackSyncStatus('正在同步…','pending');
  try{
    const cloud=await fetchCloudPackState();
    const merged=mergePackPendingIntoCloud(cloud,changes);
    await saveCloudPackState(merged.state);
    await packSleep(300);
    let split=splitPackPendingByCloud(await fetchCloudPackState(),changes);
    if(Object.keys(split.retry).length){
      const retryMerged=mergePackPendingIntoCloud(split.latest,split.retry);
      await saveCloudPackState(retryMerged.state);
      await packSleep(450);
      split=splitPackPendingByCloud(await fetchCloudPackState(),changes);
    }
    const remaining=clearFlushedPackChanges(split.verified);
    if(Object.keys(remaining).length){
      setPackSyncStatus('还有新改动待同步','pending');
      if(PACK_SYNC.timer) clearTimeout(PACK_SYNC.timer);
      PACK_SYNC.timer=setTimeout(()=>{ flushPackCloudPending().catch(()=>{}); },350);
      return false;
    }
    applyCloudPackState(split.latest.items||{},true);
    setPackSyncStatus(`已云同步 ${packNowLabel()}`,'ok');
    return true;
  }catch(e){
    console.warn('[pack-sync] flush failed', e);
    setPackSyncStatus(packSyncErrorText(e,'云同步暂不可用，本机已保存'),'err');
    return false;
  }finally{
    PACK_SYNC.flushing=false;
  }
}
async function replacePackCloudWithLocal(manual){
  if(!STATE.packing||!STATE.packing.length) return;
  const localItems=readLocalPackState();
  if(!Object.keys(localItems).length){
    setPackSyncStatus('本机没有可上传的行李改动','err');
    return;
  }
  if(manual&&!confirm('这会以本机行李清单覆盖云端，另一台手机下次同步会跟随。本机确定是最新版才继续。')) return;
  setPackSyncStatus('正在用本机清单更新云端…','pending');
  try{
    if(packCanUseBridge()){
      preparePackBridgeInteractive();
      PACK_SYNC.bridgePreferred=true;
      await ensurePackBridge();
    }else{
      await ensurePackCloud();
    }
    const data=await saveCloudPackState(makeCloudPackStateFromLocalItems(localItems,packIsoNow(),packDeviceId()));
    applyCloudPackState(data.items||{},true);
    savePendingPackChanges({});
    setPackSyncStatus(`已用本机清单更新云端 ${packNowLabel()}`,'ok');
  }catch(e){
    console.warn('[pack-sync] replace failed', e);

  }
}
async function syncPackCloudNow(manual){
  if(!STATE.packing||!STATE.packing.length) return;
  if(packCanUseBridge()&&!manual&&!PACK_SYNC.bridgeReady){
    setPackSyncStatus('点云同步连接夫妻共享清单','pending');
    return;
  }
  if(manual) setPackSyncStatus('正在同步…','pending');
  try{
    if(packCanUseBridge()){
      if(manual) preparePackBridgeInteractive();
      PACK_SYNC.bridgePreferred=true;
      await ensurePackBridge();
    }else{
      await ensurePackCloud();
    }
    const flushed=await flushPackCloudPending();
    if(!flushed) return;
    const data=await fetchCloudPackState();
    const cloudItems=data.items||{};
    const localItems=readLocalPackState();
    if(!packCloudHasAny(data) && Object.keys(localItems).length){
      queuePackCloudPatch(localItems);
      await flushPackCloudPending();
    }else{
      applyCloudPackState(cloudItems,true);
      setPackSyncStatus(`已云同步 ${packNowLabel()}`,'ok');
    }
  }catch(e){
    console.warn('[pack-sync] sync failed', e);
    setPackSyncStatus(packSyncErrorText(e,'云同步暂不可用，本机可继续改'),'err');
  }
}
function startPackCloudSync(){
  if(!STATE.packing||!STATE.packing.length) return;

function esc(t){return (t==null?'':String(t)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(t){return esc(t).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtLine(s){s=s.replace(/^(一句话|类型|状态|地点|导航|地址|怎么做|关键|营业|费用|耗时|停车|预订|执行|注意|可选|备选|路线|起点|终点|车程|距离|高速费|推荐路线|截止|固定项)(：)/,'<b class="lb">$1$2</b>');return s.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');}
function fmtDesc(d){let t=esc(d);t=t.replace(/\s*(⚠|🚨|▸|💡|✅)/g,'\n$1');return t.split(/[。；;\n]+/).map(s=>s.trim()).filter(Boolean).map(fmtLine).join('<br>');}
function statusClass(s){const v=String(s||'');if(v.includes('已确认')||v.includes('已订')||v.includes('已覆盖'))return 'ok';if(v.includes('P0'))return 'p0';if(v.includes('待')||v.includes('临近')||v.includes('条件'))return 'wait';return '';}
function googleMapsUrl(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(String(q||''));}
function hashStr(s){let h=2166136261; for(let i=0;i<s.length;i++){h^=s.charCodeAt(i); h=Math.imul(h,16777619);} return (h>>>0).toString(36);}
function packKey(cat,item){return 'europe3-pack:'+hashStr(`${cat}|${item}`);}
function packDeletedKey(key){return key+':deleted';}
function packTextKey(key){return key+':text';}
function packCustomKey(catIndex){return `europe3-pack-custom:${catIndex}`;}
function packCustomItemKey(catIndex,id){return `europe3-pack:custom:${catIndex}:${id}`;}
function loadChecked(key){try{return localStorage.getItem(key)==='1';}catch(e){return false;}}
function saveChecked(key,checked){try{const v=checked?'1':'0'; localStorage.setItem(key,v); queuePackCloudPatch({[key]:v});}catch(e){}}
function loadDeleted(key){try{return localStorage.getItem(packDeletedKey(key))==='1';}catch(e){return false;}}
function saveDeleted(key,deleted){try{const dk=packDeletedKey(key); if(deleted)localStorage.setItem(dk,'1');else localStorage.removeItem(dk); queuePackCloudPatch({[dk]:deleted?'1':null});}catch(e){}}
function cleanPackText(t){return String(t||'').replace(/\s+/g,' ').trim();}
function loadPackText(key,fallback){try{const v=localStorage.getItem(packTextKey(key)); return v==null ? String(fallback||'') : v;}catch(e){return String(fallback||'');}}
function savePackText(key,text,fallback){
  const orig=String(fallback||'');
  const v=cleanPackText(text);
  try{
    const tk=packTextKey(key);
    if(!v || v===orig){localStorage.removeItem(tk); queuePackCloudPatch({[tk]:null});}
    else{localStorage.setItem(tk,v); queuePackCloudPatch({[tk]:v});}
  }catch(e){}
  return v || orig;
}
function loadCustomItems(catIndex){
  try{
    const raw=localStorage.getItem(packCustomKey(catIndex));
    const arr=raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr.filter(x=>x&&x.id).map(x=>({id:String(x.id),text:String(x.text||'')})) : [];
  }catch(e){return [];}
}
function saveCustomItems(catIndex,items){try{const k=packCustomKey(catIndex); const v=JSON.stringify(items); localStorage.setItem(k,v); queuePackCloudPatch({[k]:v});}catch(e){}}
function addCustomItem(catIndex,text){
  const items=loadCustomItems(catIndex);
  const id=`${Date.now().toString(36)}${Math.random().toString(36).slice(2,7)}`;
  const item={id,text:cleanPackText(text)||'新增行李项'};
  items.push(item);
  saveCustomItems(catIndex,items);
  return {key:packCustomItemKey(catIndex,id),item};
}
function removeCustomItem(catIndex,key){
  const prefix=`europe3-pack:custom:${catIndex}:`;
  const id=String(key||'').startsWith(prefix) ? String(key).slice(prefix.length) : '';
  if(!id) return false;
  const items=loadCustomItems(catIndex).filter(x=>x.id!==id);
  saveCustomItems(catIndex,items);
  try{localStorage.removeItem(key);localStorage.removeItem(packTextKey(key));localStorage.removeItem(packDeletedKey(key));}catch(e){}
  queuePackCloudPatch({[key]:null,[packTextKey(key)]:null,[packDeletedKey(key)]:null});
  return true;
}

  const match=(STATE.days||[]).find(d=>d.date===local);

function renderDayMap(d){
  if(window.LMAP){try{window.LMAP.remove();}catch(e){} window.LMAP=null;}
  const pts=(d.map||[]); if(!pts.length || !window.L || !document.getElementById('daymap')) return;
  const map=L.map('daymap',{zoomControl:true,attributionControl:false,scrollWheelZoom:false});
  window.LMAP=map;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:17,crossOrigin:true}).addTo(map);
  const kc={hotel:'#145a4a',sight:'#287568',food:'#b85c38',transit:'#2d6f8e'};
  const ll=[];
  pts.forEach((p,i)=>{
    const c=kc[p.kind]||'#555';
    const ic=L.divIcon({className:'',iconSize:[24,24],iconAnchor:[12,12],html:
      `<div style="background:${c};color:#fff;width:24px;height:24px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.45)"><span style="transform:rotate(45deg);font-size:12px;font-weight:700">${i+1}</span></div>`});
    L.marker([p.lat,p.lng],{icon:ic}).addTo(map).bindPopup(`${i+1}. ${esc(p.label)}`);
    ll.push([p.lat,p.lng]);
  });
  if(ll.length>1) L.polyline(ll,{color:'#145a4a',weight:3,opacity:.55,dashArray:'7,7'}).addTo(map);
  const fit=()=>{ try{ if(ll.length>1) map.fitBounds(L.latLngBounds(ll),{paddingTopLeft:[34,34],paddingBottomRight:[34,34],maxZoom:13}); else map.setView(ll[0],12); }catch(e){ map.setView(ll[0]||[46,12],7); } };
  fit();
  // 容器尺寸/瓦片稳定后再 invalidateSize+重新 fit, 防止首帧高度未定导致 marker 被切到框外
  setTimeout(()=>{ try{ map.invalidateSize(); fit(); }catch(e){} },200);
  setTimeout(()=>{ try{ map.invalidateSize(); fit(); }catch(e){} },550);
}

let bookingFilter='pending';
function renderBookings(filter){
  if(filter) bookingFilter=filter;
  const rows=STATE.bookings||[];
  const match=b=>bookingFilter==='all'||(bookingFilter==='done'?b.status==='已确认':b.status!=='已确认');
  let h='<div class="sec-title">门票、餐厅、道路与体验预订</div>';
  h+='<div class="filters"><button class="filter '+(bookingFilter==='pending'?'on':'')+'" data-filter="pending">待处理</button><button class="filter '+(bookingFilter==='done'?'on':'')+'" data-filter="done">已确认</button><button class="filter '+(bookingFilter==='all'?'on':'')+'" data-filter="all">全部</button></div>';
  rows.filter(match).forEach(b=>{
    const p0=b.priority==='P0';
    h+=`<div class="card"${p0?' style="border-left:4px solid var(--warn)"':''}><h3>${esc(b.name||'')} <span class="status ${p0?'p0':statusClass(b.status)}">${esc(b.priority||'')}</span> <span class="status ${statusClass(b.status)}">${esc(b.status||'')}</span></h3><div class="meta"><span class="tag">${esc(b.date||'')} ${esc(b.time||'')}</span><span class="tag">${esc(b.kind||'')}</span><span class="tag">${esc(b.party||'')}</span><br><b class="lb">期限：</b>${esc(b.deadline||'')}<br><b class="lb">动作：</b>${esc(b.action||'')}<br><b class="lb">备选：</b>${esc(b.fallback||'')}${b.reference&&b.reference!=='—'?`<br><b class="lb">凭证：</b>${esc(b.reference)}`:''}</div>${/^https?:/.test(b.url||'')?`<a class="maplink" href="${escAttr(b.url)}" target="_blank" rel="noopener">↗ 官方页面</a>`:''}</div>`;
  });
  const sources=(STATE.sources||[]).filter(s=>/^https?:/.test(s.url||''));
  if(sources.length){
    h+=`<details class="card"><summary><b>资料来源与复核日期（${sources.length}）</b></summary><div class="meta" style="margin-top:10px">`;
    sources.forEach(s=>{h+=`<div style="padding:6px 0;border-top:1px solid #edf0ee"><span class="tag">${esc(s.topic||'')}</span> <a class="source-link" href="${escAttr(s.url)}" target="_blank" rel="noopener">${esc(s.name||s.url)}</a><br>${esc(s.conclusion||'')}<br><small>核验 ${esc(s.checked||'')}｜${esc(s.refresh||'')}</small></div>`;});
    h+='</div></details>';
  }
  $('v-booking').innerHTML=h;
  document.querySelectorAll('#v-booking .filter').forEach(btn=>{btn.onclick=()=>renderBookings(btn.dataset.filter);});
}

function renderTodos(){
  let h='<div class="sec-title">出发前待办</div><div class="card">';
  (STATE.predeparture_todo||[]).forEach(t=>{
    const key=packKey('predeparture',`${t.priority}|${t.deadline}|${t.label}`);
    h+=`<label class="todo" data-todo-key="${key}"><input type="checkbox" data-todo-key="${key}" aria-label="完成待办"><span class="todo-main"><span class="status ${t.priority==='P0'?'p0':''}">${esc(t.priority||'')}</span> ${esc(t.label)}<span class="todo-meta">${esc(t.deadline||'')}｜${esc(t.category||'')}｜负责人 ${esc(t.owner||'')}｜完成凭证：${esc(t.proof||'')}</span></span></label>`;
  });
  h+='</div>';
  if(STATE.packing&&STATE.packing.length){
    h+='<div class="sec-title pack-title"><span>行李</span><span class="pack-actions"><button class="pack-sync-btn" id="pack-sync-now" type="button" title="同步待办和行李清单" aria-label="同步待办和行李清单">↻ 云同步</button><button class="pack-sync-btn" id="pack-push-local" type="button" title="以本机清单覆盖云端" aria-label="以本机清单覆盖云端">↑ 本机为准</button><button class="pack-restore" id="pack-restore" type="button" title="恢复已删除行李项" aria-label="恢复已删除行李项">↺ <span id="pack-deleted-count"></span></button></span></div><div class="pack-sync-status" id="pack-sync-status"></div>';
    STATE.packing.forEach((c,ci)=>{
      let rows='';
      (c.items||[]).forEach((it)=>{
        const key=packKey(c.cat||'', it||'');
        if(loadDeleted(key)) return;
        const txt=loadPackText(key,it||'');
        rows+=`<div class="packi" data-pack-key="${key}" data-pack-cat="${ci}"><input type="checkbox" data-pack-key="${key}" data-pack-cat="${ci}" aria-label="勾选行李项"><div class="pack-text" contenteditable="true" role="textbox" spellcheck="false" data-pack-key="${key}" data-pack-original="${escAttr(it||'')}" aria-label="编辑行李项">${esc(txt)}</div><button class="pack-del" type="button" data-pack-key="${key}" data-pack-cat="${ci}" title="删除此项" aria-label="删除此项">×</button></div>`;
      });
      loadCustomItems(ci).forEach((custom)=>{
        const key=packCustomItemKey(ci,custom.id);
        if(loadDeleted(key)) return;
        const txt=loadPackText(key,custom.text||'新增行李项');
        rows+=`<div class="packi" data-pack-key="${key}" data-pack-cat="${ci}" data-pack-custom="1"><input type="checkbox" data-pack-key="${key}" data-pack-cat="${ci}" aria-label="勾选行李项"><div class="pack-text" contenteditable="true" role="textbox" spellcheck="false" data-pack-key="${key}" data-pack-original="${escAttr(custom.text||'新增行李项')}" aria-label="编辑行李项">${esc(txt)}</div><button class="pack-del" type="button" data-pack-key="${key}" data-pack-cat="${ci}" title="删除此项" aria-label="删除此项">×</button></div>`;
      });
      h+=`<div class="card pack-card" data-pack-cat="${ci}"><h3>${esc(c.cat)} <span class="pack-count" id="pack-count-${ci}"></span></h3><div class="pack-list">${rows}</div><button class="pack-add" type="button" data-pack-cat="${ci}" aria-label="添加行李项">＋ 添加一项</button></div>`;
    });
  }
  $('v-todo').innerHTML=h;
  bindTodoChecks();
  bindPackingChecks();
}

function bindTodoChecks(){
  document.querySelectorAll('.todo input[data-todo-key]').forEach(input=>{
    input.checked=loadChecked(input.dataset.todoKey);
    const row=input.closest('.todo'); if(row) row.classList.toggle('done',input.checked);
    input.onchange=()=>{
      saveChecked(input.dataset.todoKey,input.checked);
      const parent=input.closest('.todo'); if(parent) parent.classList.toggle('done',input.checked);
    };
  });
}

function packDeletedCount(){
  let n=0;
  (STATE.packing||[]).forEach(c=>{
    (c.items||[]).forEach(it=>{
      const key=packKey(c.cat||'', it||'');
      if(loadDeleted(key)) n++;
    });
  });
  return n;
}

function syncPackDeletedTools(){
  const btn=$('pack-restore'); if(!btn) return;
  const n=packDeletedCount();
  btn.classList.toggle('on', n>0);
  const cnt=$('pack-deleted-count'); if(cnt) cnt.textContent = n ? String(n) : '';
}

function renderPackRow(key,catIndex,text,original,isCustom){
  const row=document.createElement('div');
  row.className='packi';
  row.dataset.packKey=key;
  row.dataset.packCat=String(catIndex);
  if(isCustom) row.dataset.packCustom='1';
  row.innerHTML=`<input type="checkbox" data-pack-key="${key}" data-pack-cat="${catIndex}" aria-label="勾选行李项"><div class="pack-text" contenteditable="true" role="textbox" spellcheck="false" data-pack-key="${key}" data-pack-original="${escAttr(original||'')}" aria-label="编辑行李项">${esc(text)}</div><button class="pack-del" type="button" data-pack-key="${key}" data-pack-cat="${catIndex}" title="删除此项" aria-label="删除此项">×</button>`;
  return row;
}

function restoreDeletedPacking(){
  (STATE.packing||[]).forEach(c=>{
    (c.items||[]).forEach(it=>{
      const key=packKey(c.cat||'', it||'');
      saveDeleted(key,false);
    });
  });
  renderTodos();
}

function syncPackCounts(cat){
  const cards = cat==null ? document.querySelectorAll('.pack-card') : document.querySelectorAll(`.pack-card[data-pack-cat="${cat}"]`);
  cards.forEach(card=>{
    const inputs=[...card.querySelectorAll('input[type="checkbox"]')];
    inputs.forEach(input=>input.closest('.packi').classList.toggle('done', input.checked));
    const done=inputs.filter(x=>x.checked).length;
    const total=inputs.length;
    const el=$(`pack-count-${card.dataset.packCat}`);
    if(el) el.textContent = total ? `${done}/${total}` : '';
  });
}

function bindPackingChecks(){
  document.querySelectorAll('.packi input').forEach(input=>{
    input.checked = loadChecked(input.dataset.packKey);
    input.onchange=()=>{
      saveChecked(input.dataset.packKey, input.checked);
      syncPackCounts(input.dataset.packCat);
    };
  });
  document.querySelectorAll('.pack-text').forEach(el=>{
    const persist=()=>{
      const saved=savePackText(el.dataset.packKey, el.textContent, el.dataset.packOriginal||'');
      if(cleanPackText(el.textContent)!==saved) el.textContent=saved;
    };
    el.oninput=()=>{ savePackText(el.dataset.packKey, el.textContent, el.dataset.packOriginal||''); };
    el.onblur=persist;
    el.onkeydown=(ev)=>{ if(ev.key==='Enter'){ ev.preventDefault(); el.blur(); } };
    el.onpaste=(ev)=>{
      ev.preventDefault();
      const text=(ev.clipboardData||window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, cleanPackText(text));
    };
  });
  document.querySelectorAll('.pack-del').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.preventDefault();
      ev.stopPropagation();
      const row=btn.closest('.packi');
      const isCustom=row&&row.dataset.packCustom==='1';
      if(isCustom) removeCustomItem(btn.dataset.packCat, btn.dataset.packKey);
      else saveDeleted(btn.dataset.packKey,true);
      const card=btn.closest('.pack-card');
      if(row) row.remove();
      syncPackCounts(btn.dataset.packCat);
      syncPackDeletedTools();
    };
  });
  document.querySelectorAll('.pack-add').forEach(btn=>{
    btn.onclick=()=>{
      const catIndex=btn.dataset.packCat;
      const added=addCustomItem(catIndex,'新增行李项');
      const key=added.key;
      const text=added.item.text;
      const row=renderPackRow(key,catIndex,text,text,true);
      const list=btn.closest('.pack-card').querySelector('.pack-list');
      list.appendChild(row);
      bindPackingChecks();
      const editor=row.querySelector('.pack-text');
      if(editor){
        editor.focus();
        const range=document.createRange();
        range.selectNodeContents(editor);
        const sel=window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
      syncPackCounts(catIndex);
    };
  });
  const restore=$('pack-restore');
  if(restore) restore.onclick=restoreDeletedPacking;
  const syncNow=$('pack-sync-now');
  if(syncNow) syncNow.onclick=()=>syncPackCloudNow(true);
  const pushLocal=$('pack-push-local');
  if(pushLocal) pushLocal.onclick=()=>replacePackCloudWithLocal(true);
  syncPackCounts();
  syncPackDeletedTools();
  paintPackSyncStatus();
}
